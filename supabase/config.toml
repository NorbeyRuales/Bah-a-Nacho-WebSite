project_id = "bahia-nacho"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = false
sql_paths = []

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:8443"
additional_redirect_urls = ["http://127.0.0.1:8443"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false
enable_anonymous_sign_ins = false
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits_symbols"

